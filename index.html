<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Waterfront Walkathon · Toronto</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; overflow: hidden; }

  #header {
    background: #fff;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #e5e5e5;
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    height: 56px;
  }
  #header h1 { font-size: 15px; font-weight: 600; color: #111; }
  #header p { font-size: 11px; color: #888; margin-top: 1px; }
  .legend { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
  .leg { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #555; }
  .leg-line { width: 18px; height: 3px; border-radius: 2px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; }

  #map { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; }

  #panel {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 32px rgba(0,0,0,0.18);
    padding: 12px 16px 32px;
    z-index: 2000;
    max-height: 70vh;
    overflow-y: auto;
  }
  #panel-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 14px; }
  #panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3px; }
  #panel-title { font-size: 16px; font-weight: 600; color: #111; flex: 1; }
  #close-btn {
    background: #f0f0f0; border: none; border-radius: 50%;
    width: 28px; height: 28px; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #555; flex-shrink: 0; margin-left: 8px; line-height: 1;
  }
  #panel-location { font-size: 12px; color: #888; margin-bottom: 16px; }
  .vol-label { font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  #panel-volunteers { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .vol-badge {
    background: #ede9fe; color: #5b21b6;
    font-size: 13px; padding: 6px 10px 6px 12px;
    border-radius: 20px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }
  .vol-remove {
    background: none; border: none; cursor: pointer;
    color: #9c6fde; font-size: 15px; padding: 0; line-height: 1;
  }
  .vol-remove:hover { color: #5b21b6; }
  #add-vol-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  #vol-input {
    flex: 1; border: 1.5px solid #d4b8f0; border-radius: 20px;
    padding: 8px 14px; font-size: 14px; color: #111; outline: none; font-family: inherit;
  }
  #vol-input:focus { border-color: #7c3aed; }
  #vol-input::placeholder { color: #bbb; }
  #add-vol-btn {
    background: #7c3aed; color: #fff; border: none; border-radius: 20px;
    padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: inherit; white-space: nowrap;
  }
  #add-vol-btn:active { background: #5b21b6; }
  .no-vol { font-size: 13px; color: #bbb; font-style: italic; }
  #backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.25); z-index: 1999;
  }
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>Waterfront Walkathon</h1>
    <p>Martin Goodman Trail · Toronto</p>
  </div>
  <div class="legend">
    <span class="leg"><span class="leg-line" style="background:#2563eb;"></span>Out</span>
    <span class="leg"><span class="leg-line" style="background:#dc2626;"></span>Back</span>
    <span class="leg"><span class="leg-dot" style="background:#7c3aed;"></span>Station</span>
  </div>
</div>

<div id="map"></div>
<div id="backdrop" onclick="closePanel()"></div>

<div id="panel">
  <div id="panel-handle"></div>
  <div id="panel-header">
    <div id="panel-title"></div>
    <button id="close-btn" onclick="closePanel()">×</button>
  </div>
  <div id="panel-location"></div>
  <div class="vol-label">Volunteers assigned</div>
  <div id="panel-volunteers"></div>
  <div id="add-vol-row">
    <input id="vol-input" type="text" placeholder="Type a volunteer name..." maxlength="40" />
    <button id="add-vol-btn" onclick="addVolunteer()">Add</button>
  </div>
</div>

<script>
const defaultStations = [
  { id: 1, name: "Station 1 · HTO Park", location: "Start & Finish — HTO Park West, Queens Quay W", lat: 43.63843, lng: -79.37648, volunteers: [] },
  { id: 2, name: "Station 2 · Lower Spadina Ave", location: "Martin Goodman Trail at Lower Spadina Ave", lat: 43.63813, lng: -79.38268, volunteers: [] },
  { id: 3, name: "Station 3 · Dan Leckie Way", location: "Martin Goodman Trail at Dan Leckie Way", lat: 43.63660, lng: -79.38850, volunteers: [] },
  { id: 4, name: "Station 4 · Eireann Quay", location: "Martin Goodman Trail at Eireann Quay", lat: 43.63420, lng: -79.39320, volunteers: [] },
  { id: 5, name: "Station 5 · Stadium Road", location: "Martin Goodman Trail at Stadium Road", lat: 43.63260, lng: -79.39850, volunteers: [] },
  { id: 6, name: "Station 6 · Strachan Ave Turnaround", location: "MGT at Strachan Ave — turnaround point", lat: 43.63050, lng: -79.41780, volunteers: [] },
  { id: 7, name: "Station 7 · Coronation Park", location: "Remembrance Drive — return leg", lat: 43.63580, lng: -79.41200, volunteers: [] }
];

function loadStations() {
  try {
    const saved = localStorage.getItem('walkathon_stations_v2');
    if (saved) {
      const parsed = JSON.parse(saved);
      return defaultStations.map(def => {
        const s = parsed.find(p => p.id === def.id);
        return s ? { ...def, volunteers: s.volunteers } : { ...def };
      });
    }
  } catch(e) {}
  return defaultStations.map(s => ({ ...s }));
}

function saveStations() {
  try {
    localStorage.setItem('walkathon_stations_v2', JSON.stringify(
      stations.map(s => ({ id: s.id, volunteers: s.volunteers }))
    ));
  } catch(e) {}
}

const stations = loadStations();
let activeStation = null;

const outbound = [
  { lat: 43.63843, lng: -79.37648 },
  { lat: 43.63830, lng: -79.37800 },
  { lat: 43.63820, lng: -79.38000 },
  { lat: 43.63813, lng: -79.38268 },
  { lat: 43.63790, lng: -79.38450 },
  { lat: 43.63750, lng: -79.38620 },
  { lat: 43.63660, lng: -79.38850 },
  { lat: 43.63580, lng: -79.39000 },
  { lat: 43.63500, lng: -79.39120 },
  { lat: 43.63420, lng: -79.39320 },
  { lat: 43.63360, lng: -79.39520 },
  { lat: 43.63300, lng: -79.39700 },
  { lat: 43.63260, lng: -79.39850 },
  { lat: 43.63230, lng: -79.40050 },
  { lat: 43.63210, lng: -79.40230 },
  { lat: 43.63230, lng: -79.40380 },
  { lat: 43.63210, lng: -79.40520 },
  { lat: 43.63170, lng: -79.40680 },
  { lat: 43.63130, lng: -79.40900 },
  { lat: 43.63090, lng: -79.41150 },
  { lat: 43.63060, lng: -79.41400 },
  { lat: 43.63050, lng: -79.41780 },
];

const returnLeg = [
  { lat: 43.63050, lng: -79.41780 },
  { lat: 43.63120, lng: -79.41750 },
  { lat: 43.63220, lng: -79.41680 },
  { lat: 43.63350, lng: -79.41550 },
  { lat: 43.63480, lng: -79.41350 },
  { lat: 43.63580, lng: -79.41200 },
  { lat: 43.63650, lng: -79.41000 },
  { lat: 43.63670, lng: -79.40800 },
  { lat: 43.63620, lng: -79.40600 },
  { lat: 43.63560, lng: -79.40420 },
  { lat: 43.63480, lng: -79.40280 },
  { lat: 43.63400, lng: -79.40150 },
  { lat: 43.63340, lng: -79.39980 },
  { lat: 43.63310, lng: -79.39820 },
  { lat: 43.63290, lng: -79.39650 },
  { lat: 43.63340, lng: -79.39490 },
  { lat: 43.63390, lng: -79.39310 },
  { lat: 43.63460, lng: -79.39140 },
  { lat: 43.63530, lng: -79.38980 },
  { lat: 43.63490, lng: -79.38820 },
  { lat: 43.63460, lng: -79.38650 },
  { lat: 43.63440, lng: -79.38480 },
  { lat: 43.63430, lng: -79.38320 },
  { lat: 43.63490, lng: -79.38200 },
  { lat: 43.63580, lng: -79.38150 },
  { lat: 43.63660, lng: -79.38100 },
  { lat: 43.63720, lng: -79.38050 },
  { lat: 43.63780, lng: -79.37950 },
  { lat: 43.63820, lng: -79.37800 },
  { lat: 43.63843, lng: -79.37648 },
];

function initMap() {
  const map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 43.6340, lng: -79.3980 },
    zoom: 15,
    mapTypeId: 'roadmap',
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    gestureHandling: 'greedy',
    styles: [
      { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] },
      { featureType: 'transit', elementType: 'labels', stylers: [{ visibility: 'off' }] }
    ]
  });

  new google.maps.Polyline({
    path: outbound, geodesic: true,
    strokeColor: '#2563eb', strokeOpacity: 0.9, strokeWeight: 5, map
  });

  new google.maps.Polyline({
    path: returnLeg, geodesic: true,
    strokeColor: '#dc2626', strokeOpacity: 0.9, strokeWeight: 5, map
  });

  stations.forEach((s, i) => {
    const isStart = i === 0;
    const bg = isStart ? '#16a34a' : '#7c3aed';
    const marker = new google.maps.Marker({
      position: { lat: s.lat, lng: s.lng },
      map,
      label: { text: String(s.id), color: '#ffffff', fontSize: '13px', fontWeight: '600' },
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 16,
        fillColor: bg, fillOpacity: 1,
        strokeColor: '#ffffff', strokeWeight: 2.5,
      },
      title: s.name,
      zIndex: 10
    });
    marker.addListener('click', () => openPanel(s));
  });
}

function renderVolunteers(s) {
  const container = document.getElementById('panel-volunteers');
  container.innerHTML = '';
  if (s.volunteers.length === 0) {
    const empty = document.createElement('p');
    empty.className = 'no-vol';
    empty.textContent = 'No volunteers assigned yet — add one below!';
    container.appendChild(empty);
    return;
  }
  s.volunteers.forEach((v, idx) => {
    const badge = document.createElement('span');
    badge.className = 'vol-badge';
    badge.innerHTML = `${v}<button class="vol-remove" onclick="removeVolunteer(${idx})" title="Remove">×</button>`;
    container.appendChild(badge);
  });
}

function openPanel(s) {
  activeStation = s;
  document.getElementById('panel-title').textContent = s.name;
  document.getElementById('panel-location').textContent = s.location;
  document.getElementById('vol-input').value = '';
  renderVolunteers(s);
  document.getElementById('panel').style.display = 'block';
  document.getElementById('backdrop').style.display = 'block';
}

function closePanel() {
  document.getElementById('panel').style.display = 'none';
  document.getElementById('backdrop').style.display = 'none';
  activeStation = null;
}

function addVolunteer() {
  if (!activeStation) return;
  const input = document.getElementById('vol-input');
  const name = input.value.trim();
  if (!name) return;
  activeStation.volunteers.push(name);
  saveStations();
  renderVolunteers(activeStation);
  input.value = '';
  input.focus();
}

function removeVolunteer(idx) {
  if (!activeStation) return;
  activeStation.volunteers.splice(idx, 1);
  saveStations();
  renderVolunteers(activeStation);
}

document.getElementById('vol-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addVolunteer();
});
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDvb71k8qXcJkT8Nc8FWSVj1ErQ_iG5xu0&callback=initMap" async defer></script>
</body>
</html>
