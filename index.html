<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Map Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  #map { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="map"></div>
<script>
  function initMap() {
    new google.maps.Map(document.getElementById('map'), {
      center: { lat: 43.6384, lng: -79.3765 },
      zoom: 16
    });
  }
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDvb71k8qXcJkT8Nc8FWSVj1ErQ_iG5xu0&callback=initMap" async defer></script>
</body>
</html>
